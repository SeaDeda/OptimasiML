name: ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute Optimasi.ipynb --output output.ipynb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: favorita-model
          path: |
            model_artifacts/favorita_v1/model.pkl
            model_artifacts/favorita_v1/encoders.pkl
            output.ipynb